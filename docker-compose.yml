services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cacheproxyfy
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: cacheproxyfy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cacheproxyfy -d cacheproxyfy"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - internal

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CACHEPROXYFY_PROXY_PORT: "8080"

      CACHEPROXYFY_DATABASE_HOST: postgres
      CACHEPROXYFY_DATABASE_PORT: "5432"
      CACHEPROXYFY_DATABASE_USER: cacheproxyfy
      CACHEPROXYFY_DATABASE_PASSWORD: changeme
      CACHEPROXYFY_DATABASE_DBNAME: cacheproxyfy
      CACHEPROXYFY_DATABASE_SSLMODE: disable

      CACHEPROXYFY_REDIS_ADDR: redis:6379
      CACHEPROXYFY_REDIS_PASSWORD: ""
      CACHEPROXYFY_REDIS_DB: "0"

      CACHEPROXYFY_CACHE_BACKEND: local
      CACHEPROXYFY_CACHE_LOCAL_DIR: /app/data/artifacts
      CACHEPROXYFY_CACHE_TTL_HOURS: "720"
      CACHEPROXYFY_CACHE_EVICTION_INTERVAL_HOURS: "1"

      CACHEPROXYFY_SECURITY_CVE_SCANNING: "false"
      CACHEPROXYFY_SECURITY_BLOCK_SEVERITY: CRITICAL
      CACHEPROXYFY_SECURITY_WARN_SEVERITY: HIGH
    volumes:
      - artifacts:/app/data/artifacts
    ports:
      - "8080:8080"
      - "9090:9090"
    networks:
      - internal
      - external

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://proxy:9090
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    networks:
      - internal
      - external

volumes:
  postgres_data:
  redis_data:
  artifacts:

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
