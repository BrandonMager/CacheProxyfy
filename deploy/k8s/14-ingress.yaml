apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cacheproxyfy
  namespace: cacheproxyfy
  annotations:
    # Remove or replace this annotation if not using nginx ingress controller.
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    # Package proxy — all ecosystem traffic
    - host: proxy.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: proxy
                port:
                  number: 8080

    # Dashboard UI
    - host: dashboard.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 3000

    # Internal API and metrics — restrict access at the network policy level in production
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: proxy
                port:
                  number: 9090
