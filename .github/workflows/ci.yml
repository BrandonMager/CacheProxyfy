name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cacheproxyfy
          POSTGRES_PASSWORD: cacheproxyfy
          POSTGRES_DB: cacheproxyfy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
        env:
          CACHEPROXYFY_DB_HOST: localhost
          CACHEPROXYFY_DB_PORT: 5432
          CACHEPROXYFY_DB_USER: cacheproxyfy
          CACHEPROXYFY_DB_PASSWORD: cacheproxyfy
          CACHEPROXYFY_DB_NAME: cacheproxyfy
          CACHEPROXYFY_CACHE_ADDR: localhost:6379
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total" | awk '{print $3}' | tr -d '%')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "Coverage $COVERAGE% is below the 50% threshold"
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # lint job disabled: golangci-lint does not yet support Go 1.25,
  # and transitive dependencies prevent downgrading below Go 1.25.
  # re-enable once a compatible golangci-lint release is available.

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build proxy binary
        run: go build -trimpath -ldflags="-s -w" -o /dev/null .

      - name: Build healthcheck binary
        run: go build -trimpath -ldflags="-s -w" -o /dev/null ./cmd/healthcheck

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build proxy Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
